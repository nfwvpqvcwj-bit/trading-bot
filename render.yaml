services:
  - type: worker
    name: iqoption-otc-pro-signal-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: IQ_EMAIL
        sync: false
      - key: IQ_PASSWORD
        sync: false
      - key: DATA_SOURCE
        value: iqoption
      - key: ASSET
        value: EUR/USD OTC
      - key: TIMEFRAME_MINUTES
        value: "1"
      - key: IQ_ACCOUNT_TYPE
        value: PRACTICE
      - key: MODE
        value: STRICT
      - key: MIN_CONFIDENCE
        value: "82"
      - key: MAX_CONSECUTIVE_LOSSES
        value: "1"
      - key: DAILY_MAX_LOSSES
        value: "2"
      - key: COOLDOWN_AFTER_LOSS_MINUTES
        value: "15"
      - key: ALLOW_YAHOO_FALLBACK
        value: "false"
